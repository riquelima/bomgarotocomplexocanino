<!-- Lógica de Transição Suave de Páginas -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const transition = params.get('transition');
        const wrapper = document.getElementById('app-wrapper');
        
        if (wrapper && transition) {
            if (transition === 'slide-in-right') {
                wrapper.classList.add('slide-in-right');
            } else if (transition === 'slide-in-left') {
                wrapper.classList.add('slide-in-left');
            }
        }
    });

    function navigateWithSlide(targetUrl, direction = 'left') {
        const wrapper = document.getElementById('app-wrapper');
        if (wrapper) {
            if (direction === 'left') {
                wrapper.classList.add('slide-out-left');
            } else {
                wrapper.classList.add('slide-out-right');
            }
            setTimeout(() => {
                window.location.href = `${targetUrl}?transition=slide-in-${direction === 'left' ? 'right' : 'left'}`;
            }, 450);
        } else {
            window.location.href = targetUrl;
        }
    }
</script>
