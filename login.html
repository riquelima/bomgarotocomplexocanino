        /* Perspectiva 3D */
        .card-3d {
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform, box-shadow;
        }
        .card-3d:hover {
            box-shadow: 0 25px 50px rgba(0, 101, 119, 0.12), 0 1px 3px rgba(0, 0, 0, 0.04);
        }
        .card-3d-inner {
            transform: translateZ(24px);
        }
        
        /* Flutuação sutil */
        @keyframes float3d {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(1deg);
            }
        }
        .floating-3d {
            animation: float3d 6s ease-in-out infinite;
        }

        /* Shadow 3D no chão */
        @keyframes shadowSize {
            0%, 100% { transform: scale(1); opacity: 0.35; }
            50% { transform: scale(0.85); opacity: 0.15; filter: blur(4px); }
        }
        .shadow-3d-ground {
            animation: shadowSize 6s ease-in-out infinite;
        }

        /* Brilho Shimmer Glassmorphic */

            100% {

            }
        }
        .shimmer-shine {

        .shimmer-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: -75%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 100%);
            transform: skewX(-25deg);
            pointer-events: none;
        }
        .shimmer-shine:hover::after {

<!-- JavaScript para o Efeito 3D Tilt Interativo -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const cards = document.querySelectorAll('.card-3d');

        cards.forEach(card => {
            // Mousemove (Desktop)
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const dx = (x - xc) / xc;
                const dy = (y - yc) / yc;
                
                const rotX = -dy * 12; // inclinação de até 12 graus
                const rotY = dx * 12;
                
                card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(1.02, 1.02, 1.02)`;
            });

            // Mouseleave
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
            });

            // Touchmove (Mobile)
            card.addEventListener('touchmove', e => {
                if (e.touches.length === 1) {
                    const rect = card.getBoundingClientRect();
                    const touch = e.touches[0];
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    
                    if (x < 0 || x > rect.width || y < 0 || y > rect.height) {
                        card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
                        return;
                    }
                    
                    const xc = rect.width / 2;
                    const yc = rect.height / 2;
                    const dx = (x - xc) / xc;
                    const dy = (y - yc) / yc;
                    
                    const rotX = -dy * 8; // menor no mobile para estabilidade visual
                    const rotY = dx * 8;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale3d(1.01, 1.01, 1.01)`;
                }
            }, { passive: true });

            // Touchend
            card.addEventListener('touchend', () => {
                card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
            });
        });

        // Lógica de Autenticação do Bom Garoto
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const cardContainer = document.querySelector('.card-3d');

        if (form) {
            form.addEventListener('submit', e => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();
                const senha = document.getElementById('senha').value;

                errorMessage.classList.add('hidden');

                if (email === 'bomgaroto@admin.com' && senha === '1234') {
                    // Credenciais válidas -> redirecionar para a Dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Credenciais inválidas -> exibir mensagem e aplicar tremor (shake)
                    errorMessage.classList.remove('hidden');
                    
                    if (cardContainer) {
                        cardContainer.classList.add('animate-shake');
                        cardContainer.addEventListener('animationend', () => {
                            cardContainer.classList.remove('animate-shake');
                        }, { once: true });
                    }
                }
            });
        }
    });
</script>
